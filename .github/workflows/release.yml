name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dtr
          POSTGRES_USER: dtr
          POSTGRES_PASSWORD: dtr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dtr -d dtr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://dtr:dtr@localhost:5432/dtr
      SESSION_SECRET: release-test-secret-at-least-64-characters-long-for-signed-cookies-ok
      SEED_DEFAULT_ADMIN: "false"
      RUST_TEST_THREADS: "1"

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Verify formatting and Clippy
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Build Docker image
        run: docker build -t dtr:${{ github.ref_name }} .

      - name: Export Docker image artifact
        run: docker save "dtr:${{ github.ref_name }}" | gzip > "dtr-${{ github.ref_name }}-docker-image.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dtr-${{ github.ref_name }}-docker-image.tar.gz