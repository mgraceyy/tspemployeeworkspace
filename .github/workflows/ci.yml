name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shared_rate_limits: ["false", "true"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dtr
          POSTGRES_USER: dtr
          POSTGRES_PASSWORD: dtr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dtr -d dtr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://dtr:dtr@localhost:5432/dtr
      SESSION_SECRET: ci-test-secret-at-least-64-characters-long-for-signed-cookies-ok
      SEED_DEFAULT_ADMIN: "false"
      SHARED_RATE_LIMITS: ${{ matrix.shared_rate_limits }}
      RUST_LOG: dtr=warn,tower_http=warn,sqlx=warn
      RUST_BACKTRACE: 1

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Security audit
        uses: rustsec/audit-check@v2.0.0

      - name: License and dependency policy
        run: |
          cargo install cargo-deny --locked
          cargo deny check

      - name: Build
        run: cargo build --release

      - name: Wait for PostgreSQL
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          for i in $(seq 1 30); do
            if PGPASSWORD=dtr psql -h localhost -U dtr -d dtr -c 'SELECT 1' >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become ready"
          exit 1

      - name: Run tests
        run: |
          set -o pipefail
          cargo test -j 1 -- --test-threads 1 --nocapture 2>&1 | tee cargo-test.log || {
            echo "=== cargo test failed ==="
            grep -nE "FAILED|panicked at|^failures:|login failed" cargo-test.log || true
            grep -E "FAILED|panicked at|^failures:" cargo-test.log | tail -n 30 | while IFS= read -r line; do
              echo "::error title=Test failure::${line}"
            done
            echo "=== tail cargo-test.log ==="
            tail -n 150 cargo-test.log
            exit 1
          }
      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-test-log-shared-rate-limits-${{ matrix.shared_rate_limits }}
          path: cargo-test.log
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dtr
          POSTGRES_USER: dtr
          POSTGRES_PASSWORD: dtr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dtr -d dtr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://dtr:dtr@localhost:5432/dtr
      SESSION_SECRET: ci-test-secret-at-least-64-characters-long-for-signed-cookies-ok
      SEED_DEFAULT_ADMIN: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dtr:ci .

      - name: Smoke test container
        run: |
          docker run -d --name dtr-ci \
            --add-host=host.docker.internal:host-gateway \
            -p 18080:8080 \
            -e DATABASE_URL=postgres://dtr:dtr@host.docker.internal:5432/dtr \
            -e SESSION_SECRET \
            -e SEED_DEFAULT_ADMIN \
            dtr:ci
          for i in $(seq 1 30); do
            if curl -sf http://localhost:18080/health; then
              break
            fi
            sleep 2
            if [[ $i -eq 30 ]]; then
              docker logs dtr-ci
              exit 1
            fi
          done
          curl -sf http://localhost:18080/login | grep -qi "login"
          curl -sf -o /dev/null -w "%{http_code}" http://localhost:18080/static/style.css | grep -q "200"
          curl -sf http://localhost:18080/metrics | grep -q "dtr_http_requests_total"
          curl -sf http://localhost:18080/metrics | grep -q "dtr_db_pool_connections"
          curl -sf http://localhost:18080/metrics | grep -q "dtr_payroll_runs_created_total"
          for path in /admin/payroll /me/payslips; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:18080${path}")
            if [[ "$code" != "303" && "$code" != "302" && "$code" != "307" ]]; then
              echo "Expected auth redirect for ${path}, got ${code}"
              docker logs dtr-ci
              exit 1
            fi
          done
          docker stop dtr-ci

  e2e:
    runs-on: ubuntu-latest
    needs: docker
    strategy:
      fail-fast: false
      matrix:
        shared_rate_limits: ["false", "true"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dtr
          POSTGRES_USER: dtr
          POSTGRES_PASSWORD: dtr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dtr -d dtr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://dtr:dtr@localhost:5432/dtr
      SESSION_SECRET: ci-test-secret-at-least-64-characters-long-for-signed-cookies-ok
      SEED_DEFAULT_ADMIN: "true"
      SEED_E2E_FIXTURES: "true"
      SHARED_RATE_LIMITS: ${{ matrix.shared_rate_limits }}
      E2E_BASE_URL: http://127.0.0.1:8080

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build and start Docker container
        run: |
          docker build -t dtr:e2e .
          docker run -d --name dtr-e2e \
            --add-host=host.docker.internal:host-gateway \
            -p 8080:8080 \
            -e DATABASE_URL=postgres://dtr:dtr@host.docker.internal:5432/dtr \
            -e SESSION_SECRET \
            -e SEED_DEFAULT_ADMIN \
            -e SEED_E2E_FIXTURES \
            -e SHARED_RATE_LIMITS \
            dtr:e2e
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/health; then
              exit 0
            fi
            sleep 2
          done
          docker logs dtr-e2e
          exit 1

      - name: Install Playwright and run E2E tests
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm test

      - name: Stop E2E container
        if: always()
        run: docker rm -f dtr-e2e || true

  verify-backup:
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dtr
          POSTGRES_USER: dtr
          POSTGRES_PASSWORD: dtr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dtr -d dtr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://dtr:dtr@localhost:5432/dtr

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Migrate database
        run: cargo run --release --bin dtr-migrate

      - name: Create and verify backup artifact
        run: |
          ./scripts/backup-db.sh ci-backup.sql
          ./scripts/verify-backup.sh ci-backup.sql

      - name: Restore drill
        run: |
          ADMIN_URL="${DATABASE_URL%/*}/postgres"
          psql "$ADMIN_URL" -v ON_ERROR_STOP=1 -c \
            "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = 'dtr' AND pid <> pg_backend_pid();"
          psql "$ADMIN_URL" -v ON_ERROR_STOP=1 -c "DROP DATABASE IF EXISTS dtr;"
          psql "$ADMIN_URL" -v ON_ERROR_STOP=1 -c "CREATE DATABASE dtr;"
          ./scripts/restore-db.sh ci-backup.sql --yes
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c \
            "SELECT COUNT(*) >= 10 AS enough_tables FROM information_schema.tables WHERE table_schema = 'public';"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c \
            "SELECT to_regclass('public.employees') IS NOT NULL AS employees_table_ok;"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c \
            "SELECT to_regclass('public.company_settings') IS NOT NULL AS settings_table_ok;"

      - name: Uploads restore drill
        run: |
          RESTORE_DIR="/tmp/ci-uploads-restore"
          mkdir -p "$RESTORE_DIR"
          echo "drill-marker" > "$RESTORE_DIR/marker.txt"
          tar -czf uploads-drill.tar.gz -C /tmp ci-uploads-restore
          rm -rf "$RESTORE_DIR"
          UPLOAD_DIR="$RESTORE_DIR" ./scripts/restore-uploads.sh uploads-drill.tar.gz "$RESTORE_DIR" --yes
          grep -q "drill-marker" "$RESTORE_DIR/marker.txt"

      - name: Full DR drill — start app on restored data
        env:
          SESSION_SECRET: ci-test-secret-at-least-64-characters-long-for-signed-cookies-ok
          SEED_DEFAULT_ADMIN: "false"
          UPLOAD_DIR: /tmp/ci-uploads-restore
        run: |
          cargo build --release
          ./target/release/dtr &
          APP_PID=$!
          trap 'kill $APP_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/health; then
              curl -sf http://127.0.0.1:8080/health | grep -q '"status":"ok"'
              exit 0
            fi
            sleep 2
          done
          echo "App failed to become healthy after restore"
          exit 1