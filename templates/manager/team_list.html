{% extends "base.html" %}
{% block page %}
<section class="page-header">
  <h1>Team</h1>
  <p class="muted">Select an employee to view timesheet and corrections</p>
</section>

<section class="panel">
  <ul class="employee-list">
    {% for emp in content.team %}
    <li>
      <a href="/manager/team/{{ emp.id }}">{{ emp.full_name }} ({{ emp.employee_code }})</a>
      · <a href="/manager/team/{{ emp.id }}/profile">Profile</a>
    </li>
    {% else %}
    <li class="muted">No team members assigned.</li>
    {% endfor %}
  </ul>
</section>
{% endblock %}
