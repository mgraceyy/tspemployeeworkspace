{% extends "base.html" %}
{% block page %}
<section class="page-header">
  <h1>Employee Profile</h1>
  <p class="muted">{{ content.employee_code }} · {{ content.full_name }}</p>
  <p>
    <a href="/admin/employees/{{ content.employee_id }}">← Account settings</a>
    · <a href="/admin/employees/{{ content.employee_id }}/requirements">Requirements</a>
  </p>
</section>

<form method="post" action="/admin/employees/{{ content.employee_id }}/profile" class="stack">
  {% include "partials/csrf_field.html" %}
  <div class="grid-2">
    <section class="panel">
      <h2>Contact</h2>
      <label>Contact Number <input type="text" name="contact_number" value="{{ content.profile.contact_number }}"></label>
      <label>Personal Email <input type="email" name="personal_email" value="{{ content.profile.personal_email }}"></label>
    </section>
    <section class="panel">
      <h2>Personal</h2>
      <label>Birthdate <input type="date" name="birthdate" value="{{ content.profile.birthdate }}"></label>
      <label>Address <input type="text" name="address" value="{{ content.profile.address }}"></label>
      <label>Emergency Contact <input type="text" name="emergency_contact_name" value="{{ content.profile.emergency_contact_name }}"></label>
      <label>Emergency Phone <input type="text" name="emergency_contact_phone" value="{{ content.profile.emergency_contact_phone }}"></label>
    </section>
  </div>
  <section class="panel">
    <h2>Employment</h2>
    <div class="grid-2">
      <label>Job Title <input type="text" name="job_title" value="{{ content.profile.job_title }}"></label>
      <label>Department <input type="text" name="department" value="{{ content.profile.department }}"></label>
      <label>Employment Type <input type="text" name="employment_type" value="{{ content.profile.employment_type }}" placeholder="e.g. Regular, Contract"></label>
      <label>Date Hired <input type="date" name="date_hired" value="{{ content.profile.date_hired }}"></label>
      <label>Work Location <input type="text" name="work_location" value="{{ content.profile.work_location }}"></label>
    </div>
  </section>
  <button type="submit" class="btn btn-primary">Save Profile</button>
</form>
{% endblock %}
