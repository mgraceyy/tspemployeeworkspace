# Production-oriented Compose stack.
# Usage:
#   cp .env.prod.example .env
#   docker compose -f docker-compose.prod.yml --profile proxy up -d
#
# The app is not published on the host — only the reverse proxy exposes 80/443.
# Do not set TRUST_PROXY_HEADERS=true unless all client traffic passes through the proxy.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dtr
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d dtr"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  app:
    build: .
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/dtr
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET (64+ random characters)}
      APP_ENV: production
      SESSION_SECURE_COOKIES: "true"
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-false}
      METRICS_TOKEN: ${METRICS_TOKEN:?set METRICS_TOKEN for /metrics protection}
      SHARED_RATE_LIMITS: ${SHARED_RATE_LIMITS:-true}
      SEED_DEFAULT_ADMIN: "false"
      PORT: ${PORT:-8080}
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-5}
      UPLOAD_DIR: /data/uploads
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      RUST_LOG: ${RUST_LOG:-dtr=info,tower_http=warn,sqlx=warn}
    volumes:
      - uploads:/data/uploads
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  caddy:
    profiles: ["proxy"]
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docs/Caddyfile.compose:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  backup:
    profiles: ["ops"]
    image: postgres:16
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGHOST: db
      PGUSER: ${POSTGRES_USER}
      PGDATABASE: dtr
      BACKUP_DIR: /backups
      UPLOAD_DIR: /data/uploads
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_STATUS_FILE: /backups/last-backup.status
      # Optional: POST failure notifications to Slack/Discord/etc.
      # BACKUP_WEBHOOK_URL: ${BACKUP_WEBHOOK_URL:-}
    volumes:
      - ./backups:/backups
      - uploads:/data/uploads:ro
      - ./scripts/backup-scheduled.sh:/usr/local/bin/backup-scheduled.sh:ro
    entrypoint:
      - /bin/bash
      - -c
      - |
        while true; do
          bash /usr/local/bin/backup-scheduled.sh
          sleep 86400
        done
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config: