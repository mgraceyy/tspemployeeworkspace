services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dtr
      POSTGRES_USER: dtr
      POSTGRES_PASSWORD: dtr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dtr -d dtr"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://dtr:dtr@db:5432/dtr
      SESSION_SECRET: ${SESSION_SECRET:-change-me-to-a-random-string-at-least-64-characters-long-for-signed-cookies-ok}
      SEED_DEFAULT_ADMIN: ${SEED_DEFAULT_ADMIN:-true}
      RUST_LOG: ${RUST_LOG:-dtr=info,tower_http=info,sqlx=warn}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata: